# Tomcat
server:
  tomcat:
    uri-encoding: UTF-8
    threads:
      min-spare: 30
      max: 1000
    max-http-form-post-size: -1      # 表单 POST 最大大小（-1 表示不限制）
    max-swallow-size: -1             # 防止超大请求体被静默吞掉（-1 表示不限制）
  port: 80
  servlet:
    context-path: /

spring:
  application:
    name: web
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: -1              # 单个文件大小不限制
      max-request-size: -1           # 整个 multipart 请求体大小不限制
      enabled: true
  redis:
    database: 0
    host: localhost
    port: 6379
    password: autumn # 密码（默认为空）
    timeout: 6000ms  # 连接超时时长（毫秒）
    jedis:
      pool:
        max-active: 1000  # 连接池最大连接数（使用负值表示没有限制）
        max-wait: -1ms      # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-idle: 10      # 连接池中的最大空闲连接
        min-idle: 5       # 连接池中的最小空闲连接
  freemarker:
    suffix: .html
    request-context-attribute: request
  main:
    allow-circular-references: true
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER

autumn:
  # —— 首次安装向导（给最终用户用）——
  # autumn.install.wizard：是否启用。为 true 且尚未生成数据源文件时，打开网站会先进入安装页，无需手写配置。
  # autumn.install.config-path：连接信息保存位置（相对程序运行目录），默认 config/datasource.yml。
  # autumn.install.force：为 true 时忽略已有数据源文件，强制重新安装（也可用环境变量 AUTUMN_INSTALL_FORCE=true）。
  # 本地开发可保持 wizard: false，继续使用 application-dev 等里的数据库设置。
  install:
    wizard: false
    config-path: config/datasource.yml
    force: false
  # 备份节点控制（与 Redisson 分布式锁叠加：先标记排除副本，再在剩余实例上争用 leader）。
  # backup:
  #   exclude: true                    # 推荐：本实例永不执行备份（Deployment/环境变量单独设为 true）
  #   exclude-hosts: replica,k8s-*      # 可选：集中列出主机模式（前缀/后缀/*包含*）
  #   exclude-addresses: 10.244.12.3    # 可选：按本机 IP 精确排除
  redis:
    open: false  # 是否开启redis缓存  true开启   false关闭
  shiro:
    redis: false # true表示shiro session存到redis里，需要开启redis，才会生效【分布式场景】
  # 可选：无 URL 时指定库类型；通常由 spring.datasource.druid.first.url 推断，无需配置。
  # database: postgresql
  table:
    auto: update
    init: true
    pack: cn.org.autumn.modules

#mybatis
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  #实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: cn.org.autumn.modules.*.entity
  global-config:
    #主键类型  0:"数据库ID自增", 1:"用户输入ID",2:"全局唯一ID (数字类型唯一ID)", 3:"全局唯一ID UUID";
    id-type: 0
    #字段策略 0:"忽略判断",1:"非 NULL 判断"),2:"非空判断"
    field-strategy: 0
    #驼峰下划线转换
    db-column-underline: true
    #刷新mapper 调试神器
    refresh-mapper: true
    #数据库大写下划线转换
    #capital-mode: true
    # Sequence序列接口实现类配置
    #key-generator: com.baomidou.mybatisplus.incrementer.OracleKeyGenerator
    #逻辑删除配置
    logic-delete-value: -1
    logic-not-delete-value: 0
    #自定义填充策略接口实现
    #meta-object-handler: com.baomidou.springboot.xxx
    #自定义SQL注入器
    sql-injector: cn.org.autumn.config.AutumnQuotedTableSqlInjector
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true

logging:
  level:
    root: info
    cn.org.autumn: info
    com.aliyun.oss: fatal
    springfox.documentation: fatal
    org.quartz: warn
    org.springframework: fatal
    org.springframework.web: warn
    org.springframework.web.servlet.DispatcherServlet: fatal
    org.springframework.web.servlet.view: fatal
    org.springframework.jmx: warn
    org.springframework.boot.web: warn
    org.springframework.boot.web.servlet: warn
    com.netflix.discovery.shared.resolver.aws: fatal
    org.springframework.boot.web.embedded: info
    com.baomidou.mybatisplus.toolkit: error
    org.apache.shiro.session: fatal
    com.alibaba.druid: off
    org.mybatis.spring: info
    org.apache.tomcat: info
    org.apache.catalina: info
    sun.rmi.transport.tcp: info
    com.netflix: fatal
    net.sf.ehcache: fatal
    io.netty.resolver.dns: fatal

  file:
    name: file.log
    path: logs/

pagehelper:
  reasonable: true
  supportMethodsArguments: true
  params: count=countSql

mybatis:
  mapperLocations: classpath:mapper/**/*.xml


