# Tomcat
server:
  tomcat:
    uri-encoding: UTF-8
    threads:
      min-spare: 30
      max: 1000
    max-http-form-post-size: -1      # 表单 POST 最大大小（-1 表示不限制）
    max-swallow-size: -1             # 防止超大请求体被静默吞掉（-1 表示不限制）
  port: 80
  servlet:
    context-path: /

spring:
  application:
    name: web
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: -1              # 单个文件大小不限制
      max-request-size: -1           # 整个 multipart 请求体大小不限制
      enabled: true
  data:
    redis:
      database: 0
      host: 127.0.0.1
      port: 6379
      password: autumn # 密码（默认为空）
      timeout: 6000ms  # 连接超时时长（毫秒）
      lettuce:
        pool:
          max-active: 1000  # 连接池最大连接数（使用负值表示没有限制）
          max-wait: -1ms      # 连接池最大阻塞等待时间（使用负值表示没有限制）
          max-idle: 10      # 连接池中的最大空闲连接
          min-idle: 5       # 连接池中的最小空闲连接
  freemarker:
    suffix: .html
    request-context-attribute: request
  main:
    allow-circular-references: true
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER

autumn:
  # MyBatis-Plus 列名/表名包装：下方 mybatis-plus.global-config.db-config 为默认；
  # cn.org.autumn.config.MybatisPlusConfig 按 autumn.database 覆盖（PG/Oracle/SQL Server 等）。
  # 物理列名为 SQL 保留字（如 order）时：实体 Java 属性勿用保留字，用 sortOrder + @TableField("order")，见 SysConfigEntity。
  # —— 首次安装向导（给最终用户用）——
  # autumn.install.wizard：为 true 且尚未生成数据源文件时，打开网站会先进入安装页。
  # autumn.install.config-path：连接信息保存位置（相对程序运行目录），默认 config/datasource.yml。
  # autumn.install.force：为 true 时忽略已有数据源文件，强制重新安装（也可用 AUTUMN_INSTALL_FORCE=true）。
  # 本地开发可保持 wizard: false，继续使用 application-dev 等里的数据库设置。
  install:
    wizard: false
    config-path: config/datasource.yml
    force: false
  # 备份节点控制（与 Redisson 分布式锁叠加：先标记排除副本，再在剩余实例上争用 leader）。
  # backup:
  #   exclude: true                    # 推荐：本实例永不执行备份（Deployment/环境变量单独设为 true）
  #   exclude-hosts: replica,k8s-*      # 可选：集中列出主机模式（前缀/后缀/*包含*）
  #   exclude-addresses: 10.244.12.3    # 可选：按本机 IP 精确排除
  redis:
    open: true  # 是否开启redis缓存  true开启   false关闭
  shiro:
    redis: true # true表示shiro session存到redis里，需要开启redis，才会生效【分布式场景】
  # mysql | mariadb | postgresql | oracle | sqlserver（仅影响分页方言；注解建表仅 mysql 系与 postgresql）
  # 可选：无 URL 时指定库类型；通常由 spring.datasource.druid.first.url 推断，可与下方 database 二选一或省略。
  database: mysql
  table:
    auto: update
    init: true
    pack: cn.org.autumn.modules

# mybatis-plus 3.x 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  #实体扫描，多个package用逗号或者分号分隔
  type-aliases-package: cn.org.autumn.modules.*.entity
  global-config:
    banner: false
    db-config:
      #主键类型 AUTO:"数据库ID自增", INPUT:"用户输入ID", ASSIGN_ID:"雪花算法ID", ASSIGN_UUID:"UUID"
      id-type: AUTO
      # 占位符；MySQL/MariaDB 反引号。PG/Oracle/SQL Server 与 Derby 等在 MybatisPlusConfig 中按数据源类型覆盖，勿仅依赖本行。
      column-format: "`%s`"
      #字段验证策略 NEVER:"忽略判断", NOT_NULL:"非NULL判断", NOT_EMPTY:"非空判断", ALWAYS:"总是加入"
      insert-strategy: ALWAYS
      update-strategy: NOT_NULL
      select-strategy: NOT_NULL
      #驼峰下划线转换
      table-underline: true
      #逻辑删除配置
      logic-delete-value: -1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true

logging:
  level:
    root: info
    cn.org.autumn: info
    com.aliyun.oss: fatal
    springfox.documentation: fatal
    org.quartz: warn
    org.springframework: fatal
    org.springframework.web: warn
    org.springframework.web.servlet.DispatcherServlet: fatal
    org.springframework.web.servlet.view: fatal
    org.springframework.jmx: warn
    org.springframework.boot.web: warn
    org.springframework.boot.web.servlet: warn
    com.netflix.discovery.shared.resolver.aws: fatal
    org.springframework.boot.web.embedded: info
    com.baomidou.mybatisplus: fatal
    com.baomidou.mybatisplus.toolkit: error
    org.apache.shiro.session: fatal
    com.alibaba.druid: off
    org.mybatis.spring: info
    org.apache.tomcat: info
    org.apache.catalina: info
    sun.rmi.transport.tcp: info
    com.netflix: fatal
    net.sf.ehcache: fatal
    io.netty.resolver.dns: fatal

  file:
    name: file.log
    path: logs/

pagehelper:
  reasonable: true
  supportMethodsArguments: true
  params: count=countSql

mybatis:
  mapperLocations: classpath*:mapper/**/*.xml
