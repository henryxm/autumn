# Install wizard seed strings (UTF-8)
sys_string_install_html_lang=en
sys_string_install_title=Install Wizard
sys_string_install_welcome=Welcome
sys_string_install_hero_hint=Follow the steps to review notices, configure the database, and run checks. Settings will be saved and the service will restart to connect to your database and prepare schema and baseline data.
sys_string_install_btn_home=Open site home
sys_string_install_btn_login=Go to login

sys_string_install_panel1_title=Notices & agreement
sys_string_install_note_1=After installation, the database connection is saved under <code>config/datasource.yml</code> in the application directory. To change the path, set <code>autumn.install.config-path</code>.
sys_string_install_note_2=The database user must be able to <strong>create and drop tables</strong> and perform normal reads/writes. The check will temporarily create and drop a test table—this is expected.
sys_string_install_note_3=For emoji and multilingual text, the wizard adds suitable connection parameters for common databases. If you use advanced mode with a custom JDBC URL, ensure charset and database settings match.
sys_string_install_note_4=Reinstall: delete the config file above, or set <code>AUTUMN_INSTALL_FORCE=true</code> (or <code>autumn.install.force=true</code>).
sys_string_install_note_5=If you only truncate data but keep the config file, startup may fail—restore the database or remove the config before reinstalling.
sys_string_install_note_6=Some databases require the official JDBC driver on the classpath, depending on how you deploy.
sys_string_install_agree_checkbox=I have read and understood the notices above
sys_string_install_btn_agree_continue=Agree and continue

sys_string_install_panel2_title=Database connection
sys_string_install_panel2_intro=Configure in order: database type → connection mode → parameters. This matches common deployments; available modes depend on the database type.
sys_string_install_lbl_database_type=Database type
sys_string_install_hint_select_type_first=Choose a database type first, then a connection mode.
sys_string_install_lbl_h2_compat=H2 compatibility mode
sys_string_install_h2_guide_title=Mode guide (click a row to switch quickly)
sys_string_install_h2_th_mode=Mode
sys_string_install_h2_th_scenario=Typical use
sys_string_install_h2_th_autumn=With Autumn
sys_string_install_tag_rec=Recommended
sys_string_install_tag_caution=Caution
sys_string_install_tag_exp=Experimental
sys_string_install_tag_optional=Optional
sys_string_install_h2_mysql_c2=Closest to production MySQL; good for local/demo with annotation DDL and common MySQL SQL.
sys_string_install_h2_mysql_c3=When the JDBC URL includes <code>MODE=MySQL</code>, the framework uses H2-MySQL-compatible DDL and dialect routing, aligned with MySQL-first development.
sys_string_install_h2_native_c2=Exercise native H2 semantics; does not rely on backticks or <code>information_schema</code> MySQL habits.
sys_string_install_h2_native_c3=Uses <code>DatabaseType.H2</code> with ANSI double-quoted DDL; entities and hand-written SQL must match ANSI/H2—do not assume MySQL-only syntax.
sys_string_install_h2_pg_c2=Try PostgreSQL-style functions or syntax differences; small experiments only.
sys_string_install_h2_pg_c3=Still H2 under the hood but SQL leans PG-like; differs from Autumn’s MySQL-centric defaults—only if you know why.
sys_string_install_h2_ora_c2=Compare Oracle-style dialect locally (not a real Oracle server).
sys_string_install_h2_ora_c3=Large gap from Autumn’s default MySQL path; usually needs custom JDBC/SQL—not ideal as a first install default.
sys_string_install_h2_mssql_c2=Try SQL Server–style compatibility locally.
sys_string_install_h2_mssql_c3=Far from the default stack; for focused tests only—use real SQL Server in production.
sys_string_install_h2_maria_c2=Lightweight MariaDB-like compatibility experiments locally.
sys_string_install_h2_maria_c3=Close to <code>MYSQL</code> but still a compatibility layer; for production MariaDB, pick the MariaDB type instead of simulating via H2.
sys_string_install_h2_native_warn=Native H2 or non-MySQL compatibility disables the H2 + <code>MODE=MySQL</code> adapter path—ensure your SQL matches the chosen dialect.

sys_string_install_lbl_conn_mode=Connection mode
sys_string_install_mode_remote_title=Remote server
sys_string_install_mode_remote_desc=Pick the database type, then host, port, and database name. For MySQL, PostgreSQL, and similar central deployments.
sys_string_install_mode_file_title=Local file
sys_string_install_mode_file_desc=Data on local disk; suitable for H2, SQLite, HSQLDB, Derby.
sys_string_install_mode_mem_title=In-memory (trial)
sys_string_install_mode_mem_desc=For demos and quick tests only; data is cleared when the service restarts.
sys_string_install_memory_warn=In-memory mode: data is lost on restart—do not use in production.

