# 安装向导：classpath 种子（UTF-8），key 与模板/脚本一致
sys_string_install_html_lang=zh-CN
sys_string_install_title=安装向导
sys_string_install_welcome=欢迎使用
sys_string_install_hero_hint=按步骤完成说明确认、数据库配置与检测。保存后将自动重启并连接您选择的数据库，完成表结构与基础数据准备。
sys_string_install_btn_home=进入网站首页
sys_string_install_btn_login=去登录页

sys_string_install_panel1_title=说明与同意
sys_string_install_note_1=安装结束后，数据库连接会保存到程序目录下的 <code>config/datasource.yml</code>。如需改路径，可配置 <code>autumn.install.config-path</code>。
sys_string_install_note_2=数据库账号需具备<strong>建表、删表</strong>及日常读写权限。检测时会临时创建并删除一张测试表，属正常现象。
sys_string_install_note_3=为支持表情与多语言文本，向导会在常见数据库上附带合适的连接参数。若使用高级模式自写连接串，请确认字符集与库设置一致。
sys_string_install_note_4=重新安装：删除上述配置文件，或设置环境变量 <code>AUTUMN_INSTALL_FORCE=true</code>（或配置 <code>autumn.install.force=true</code>）。
sys_string_install_note_5=若只清空库中数据而保留配置文件，可能导致无法启动，请先恢复库或删除配置后重新安装。
sys_string_install_note_6=部分数据库需将官方驱动放入运行环境的 classpath，具体取决于部署方式。
sys_string_install_agree_checkbox=我已阅读并理解上述说明
sys_string_install_btn_agree_continue=同意并继续

sys_string_install_panel2_title=数据库连接
sys_string_install_panel2_intro=按「数据库类型 → 连接方式 → 参数填写」的顺序配置，更贴近实际部署习惯。不同数据库会自动限制可用连接方式并给出建议。
sys_string_install_lbl_database_type=数据库类型
sys_string_install_hint_select_type_first=先选择数据库类型后，再选择连接方式。
sys_string_install_lbl_h2_compat=H2 兼容模式
sys_string_install_h2_guide_title=模式说明（点击表格行可快速切换）
sys_string_install_h2_th_mode=模式
sys_string_install_h2_th_scenario=典型适用场景
sys_string_install_h2_th_autumn=与 Autumn 配合
sys_string_install_tag_rec=推荐默认
sys_string_install_tag_caution=谨慎
sys_string_install_tag_exp=实验
sys_string_install_tag_optional=可选
sys_string_install_h2_mysql_c2=希望与生产 MySQL 行为最接近；本地/演示环境跑通注解建表与常见 MySQL 语法。
sys_string_install_h2_mysql_c3=JDBC URL 含 <code>MODE=MySQL</code> 时走框架内嵌 H2-MySQL 兼容 DDL 与方言路由，与业务以 MySQL 为基准的开发习惯一致。
sys_string_install_h2_native_c2=刻意验证 H2 原生语义；不依赖反引号、<code>information_schema</code> 等 MySQL 习惯用法。
sys_string_install_h2_native_c3=按 <code>DatabaseType.H2</code> 走双引号 ANSI DDL；实体与手写 SQL 需与 ANSI/H2 语义对齐，勿假设 MySQL 专有写法。
sys_string_install_h2_pg_c2=尝试 PostgreSQL 风格函数或语法差异；小规模语法对照实验。
sys_string_install_h2_pg_c3=仍解析为 H2 类型，但 SQL 语义贴近 PG；与 Autumn 以 MySQL 为中心的默认路径不一致，仅适合有明确目标的场景。
sys_string_install_h2_ora_c2=对照 Oracle 方言差异做本地实验（不等同于真实 Oracle）。
sys_string_install_h2_ora_c3=与 Autumn 默认 MySQL 族路径差异大，通常需配合高级 JDBC 或改写 SQL，不建议作为首次安装默认。
sys_string_install_h2_mssql_c2=对照 SQL Server 兼容语法做本地实验。
sys_string_install_h2_mssql_c3=与 Autumn 默认栈差异大，多用于专项验证；生产请使用真实 SQL Server 与对应配置。
sys_string_install_h2_maria_c2=希望略贴近 MariaDB 兼容语义时的本地尝试。
sys_string_install_h2_maria_c3=与 <code>MYSQL</code> 接近但仍属兼容层实验；若目标是生产 MariaDB，建议直接选数据库类型 MariaDB 而非 H2 模拟。
sys_string_install_h2_native_warn=原生 H2 或非 MySQL 兼容模式下，不会启用 H2 + <code>MODE=MySQL</code> 适配链路，请确认业务 SQL 与方言匹配。

sys_string_install_lbl_conn_mode=连接方式
sys_string_install_mode_remote_title=远程服务器
sys_string_install_mode_remote_desc=先确定数据库类型，再填主机、端口、库名。适用于 MySQL、PostgreSQL 等集中部署。
sys_string_install_mode_file_title=本机文件
sys_string_install_mode_file_desc=数据保存在本机磁盘，适合 H2、SQLite、HSQLDB、Derby。
sys_string_install_mode_mem_title=内存库（试用）
sys_string_install_mode_mem_desc=仅用于演示和快速验证；服务重启后数据清空。
sys_string_install_memory_warn=您选择了内存库：服务重启后数据会丢失，请勿用于正式环境。

sys_string_install_lbl_host=主机地址
sys_string_install_lbl_port=端口
sys_string_install_port_ph_default=可留空使用默认
sys_string_install_lbl_database=库名 / 路径
sys_string_install_database_ph=按下方提示填写
sys_string_install_lbl_username=用户名
sys_string_install_lbl_password=密码

sys_string_install_redis_section=Redis（可选）
sys_string_install_redis_intro=不勾选则安装后以单机运行（配置中不写 <code>spring.redis</code>）；需要分布式缓存、会话或锁时再改配置并重启。
sys_string_install_redis_enable=启用 Redis 并写入连接信息
sys_string_install_redis_shiro=Shiro 会话存 Redis（多节点共享登录态，需 Redis 稳定可用）
sys_string_install_lbl_redis_host=Redis 主机
sys_string_install_lbl_redis_port=端口
sys_string_install_lbl_redis_password=Redis 密码（无则留空）
sys_string_install_ph_optional=选填

sys_string_install_lbl_extra_options=附加连接参数（选填）
sys_string_install_extra_hint=例如 PostgreSQL 需要 SSL 时可填 <code>sslmode=require</code>（以数据库文档为准）。
sys_string_install_adv_check=高级：自行填写完整 JDBC 连接串与驱动类名
sys_string_install_lbl_jdbc_url=JDBC 连接串
sys_string_install_jdbc_ph=以 jdbc: 开头
sys_string_install_lbl_driver=驱动类名（可留空则与类型默认一致）

sys_string_install_btn_prev=上一步
sys_string_install_btn_next=下一步

sys_string_install_panel3_title=检查连接与权限
sys_string_install_panel3_intro=将尝试连接数据库，并验证建表、删表权限。若失败，请根据提示核对账号、网络或库名。
sys_string_install_btn_run_check=开始检查
sys_string_install_btn_check_ok_next=检查通过，继续

sys_string_install_panel4_title=确认数据库现状
sys_string_install_panel4_intro=以下为当前库中可读到的数据表列表。若已有大量业务表，请先确认是否与自动建表策略冲突，建议备份或更换空库。
sys_string_install_panel4_note1=点击「确认并完成安装」将写入配置文件，随后服务<strong>自动重启</strong>。
sys_string_install_panel4_note2=重启后会按系统设置维护表结构并写入运行所需基础数据。
sys_string_install_btn_refresh_meta=刷新列表
sys_string_install_btn_finish=确认并完成安装

sys_string_install_panel5_title_progress=安装进行中
sys_string_install_phase_saving=正在保存配置并准备重启…
sys_string_install_fail_sub=请查看运行日志或联系运维。修正问题后可刷新本页重试（必要时按说明清理配置后再安装）。
sys_string_install_btn_reload=刷新页面

