<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>${title!'选择绑定方式'}</title>
  <style>
    :root {
      --brand-1: #5b6cf0;
      --brand-2: #7c3aed;
      --text: #1a1d26;
      --muted: #64748b;
      --border: #e8ecf4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 42%, #312e81 100%);
      color: var(--text);
    }
    .card {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border-radius: 16px;
      padding: 36px 32px 32px;
      box-shadow: 0 24px 64px rgba(15, 23, 42, 0.28);
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 10px; text-align: center; }
    p.lead { font-size: 14px; color: var(--muted); line-height: 1.65; margin-bottom: 24px; text-align: center; }
    .actions { display: flex; flex-direction: column; gap: 12px; }
    .btn {
      display: block;
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      border: none;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
      color: #fff;
    }
    .btn-ghost {
      background: #fff;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>${title!'选择绑定方式'}</h1>
    <p class="lead">${message!'授权已成功。请选择如何关联本地账号。'}</p>
    <div class="actions">
      <a class="btn btn-primary" href="${loginBindUrl!'/login'}">登录已有账号并绑定</a>
      <form method="post" action="${createBindAction!'/client/oauth2/bind/create'}">
        <input type="hidden" name="token" value="${bindToken!''}">
        <button type="submit" class="btn btn-ghost">创建新账号并绑定</button>
      </form>
    </div>
    <p class="hint">若已有本地账号，请先登录后再完成绑定；若无账号，可选择创建新账号。</p>
  </div>
</body>
</html>
