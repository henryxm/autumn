<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <title>开放平台授权</title>
    <link rel="stylesheet" href="/statics/css/signin.css"/>
</head>
<body class="login-page-v2">
<div class="login-box" style="max-width:480px;margin:40px auto;">
    <h3>应用授权确认</h3>
    <p>应用 <strong>${appName!''}</strong>（${appId!''}，${appType!'Web'}）请求获取您的 openId 与 unionId。</p>
    <#if loginUserName??>
        <p>当前账号：${loginUserName}</p>
    </#if>
    <#if error??>
        <p style="color:#c0392b;">${error}</p>
    </#if>
    <form method="post" action="${request.contextPath}/open/oauth2/authorize/approve">
        <input type="hidden" name="app_id" value="${appId!''}"/>
        <input type="hidden" name="redirect_uri" value="${redirectUri!''}"/>
        <input type="hidden" name="response_type" value="${responseType!'code'}"/>
        <input type="hidden" name="scope" value="${scope!'basic'}"/>
        <#if state??><input type="hidden" name="state" value="${state}"/></#if>
        <input type="hidden" name="consentCsrf" value="${consentCsrfToken!''}"/>
        <label><input type="checkbox" name="userConsent" value="true"/> 我已阅读并同意授权</label>
        <div style="margin-top:16px;">
            <button type="submit">确认授权</button>
            <a href="${denyRedirect!'/'}" style="margin-left:12px;">取消</a>
        </div>
    </form>
</div>
</body>
</html>
